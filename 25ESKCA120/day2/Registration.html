<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="styleform.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <h2>Registration Form</h2>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter full name">

            <label>Email Address</label>
            <input type="email" placeholder="Enter email address">

            <div class="row">
                <div class="input-box">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter phone number">
                </div>

                <div class="input-box">
                    <label>Birth Date</label>
                    <input type="date">
                </div>
            </div>

            <label>Gender</label>

            <div class="gender">
                <label><input type="radio" name="gender" checked> Male</label>

                <label><input type="radio" name="gender"> Female</label>

                <label><input type="radio" name="gender"> Prefer not to say</label>
            </div>

            <label>Address</label>

            <input type="text" placeholder="Enter street address">

            <input type="text" placeholder="Enter street address line 2">

            <div class="row">
                <div class="input-box">
                    <select>
                        <option>Country</option>
                        <option>India</option>
                        <option>USA</option>
                        <option>Canada</option>
                    </select>
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Enter your city">
                </div>
            </div>

            <div class="row">
                <div class="input-box">
                    <input type="text" placeholder="Enter your region">
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Enter postal code">
                </div>
            </div>

            <button type="submit">Submit</button>

        </form>

    </div>
</div>

</body>
</html>
